
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROCOP 5.01 — Comunicaciones</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root {
  --bg:#0f1117;--surface:#181b24;--surface2:#1e2230;--surface3:#242840;
  --border:#2a2e3e;--border2:#373d52;
  --text:#e8eaf0;--text2:#8b90a4;--text3:#454a5e;
  --accent:#6366f1;--accent2:#4f52d6;
  --chip:#1e2230;--chip-border:#373d52;--chip-text:#c8cbdc;
  --ok:#22c55e;--ok-bg:#0a2015;--ok-border:#166534;
  --err:#ef4444;--err-bg:#200a0a;--err-border:#7f1d1d;
  --node-bg:#1a2a4a;--node-text:#7fb3f5;--node-border:#2a4a80;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.app-header{text-align:center;padding:2rem 1rem 1rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
.app-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;}
.app-title{font-size:22px;font-weight:600;}
.app-sub{font-size:13px;color:var(--text2);margin-top:4px;}

.score-bar{display:flex;justify-content:center;gap:2.5rem;padding:.75rem 1rem 1.25rem;}
.score-item{text-align:center;}
.score-num{font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.score-num.ok{color:var(--ok);}
.score-num.err{color:var(--err);}
.score-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* TABS */
.tabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:0 1rem 1rem;}
.tab-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;padding:6px 13px;border-radius:6px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;}
.tab-btn:hover{border-color:var(--accent);color:var(--text);}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* LEVEL */
.level-toggle{display:flex;justify-content:center;gap:8px;margin-bottom:1.5rem;}
.level-btn{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 22px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;}
.level-btn:hover{border-color:var(--accent);color:var(--text);}
.level-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* CARD */
.card{max-width:920px;margin:0 auto 3rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px;}
.card-title{font-size:15px;font-weight:600;}
.card-sub{font-size:12px;color:var(--text2);margin-top:3px;font-family:'IBM Plex Mono',monospace;}
.btn-row{display:flex;gap:8px;flex-shrink:0;}
button.act{font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 16px;border-radius:6px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:background .15s;}
button.act:hover{background:var(--border);}
button.act.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
button.act.primary:hover{background:var(--accent2);}

/* DIAGRAM */
.diagram{display:flex;flex-direction:column;align-items:center;gap:4px;}
.d-row{display:flex;gap:8px;justify-content:center;align-items:flex-start;width:100%;flex-wrap:wrap;}
.d-arrow{font-size:14px;color:var(--text3);line-height:1;text-align:center;padding:2px 0;}
.h-arrow{font-size:13px;color:var(--text3);display:flex;align-items:center;padding-top:28px;flex-shrink:0;}

.node{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px;text-align:center;min-width:115px;}
.node-title{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--node-text);background:var(--node-bg);border:1px solid var(--node-border);border-radius:5px;padding:4px 8px;margin-bottom:4px;white-space:nowrap;}

/* DROP ZONES */
.drop-zone{min-height:27px;border:1px dashed var(--border2);border-radius:5px;margin-top:3px;display:flex;align-items:center;justify-content:center;padding:3px 5px;transition:background .12s,border-color .12s;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);position:relative;}
.drop-zone.over{background:#1a2545;border-color:var(--accent);border-style:solid;}
.drop-zone.correct{background:var(--ok-bg);border-color:var(--ok);border-style:solid;}
.drop-zone.wrong{background:var(--err-bg);border-color:var(--err);border-style:solid;}
.drop-zone .fi{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none;}
.drop-zone input[type=text]{width:100%;background:transparent;border:none;outline:none;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--chip-text);text-align:center;padding:2px 20px 2px 4px;}
.drop-zone input::placeholder{color:var(--text3);}
.drop-zone.correct input{color:var(--ok);}
.drop-zone.wrong input{color:var(--err);}

/* CHIPS */
.chip{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;padding:5px 11px;border-radius:5px;cursor:grab;user-select:none;white-space:nowrap;border:1px solid var(--chip-border);background:var(--chip);color:var(--chip-text);transition:opacity .1s;}
.chip:active{cursor:grabbing;}
.chip.dragging{opacity:.25;}

/* POOL */
.pool-wrap{margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1rem;}
.pool-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:44px;background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:10px;}

/* RESULT */
.result{margin-top:1rem;font-size:13px;text-align:center;min-height:20px;font-weight:500;font-family:'IBM Plex Mono',monospace;}
.result.ok{color:var(--ok);}
.result.fail{color:var(--err);}

/* ROW LABELS */
.row-labels{display:flex;flex-direction:column;justify-content:space-around;gap:3px;padding:30px 0 3px;text-align:right;flex-shrink:0;}
.row-labels span{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}

/* REFERENCE TABLES */
.ref-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:.5rem;}
.ref-table th{background:var(--node-bg);color:var(--node-text);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:8px 12px;border:1px solid var(--node-border);text-align:left;}
.ref-table td{padding:7px 12px;border:1px solid var(--border);vertical-align:middle;}
.ref-table td:first-child{color:var(--text2);font-size:12px;}
.ref-table tr:nth-child(even) td{background:var(--surface2);}
.ref-table .dz-cell{padding:4px 8px;}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-tag">PROCOP 5.01 · Bomberos Valencia</div>
  <h1 class="app-title">Escenarios de Comunicaciones</h1>

<div class="score-bar">
  <div class="score-item"><div class="score-num ok" id="sc-ok">0</div><div class="score-lbl">Correctos</div></div>

<div class="tabs" id="tabs"></div>

<div class="level-toggle">

  <button class="level-btn" onclick="setLevel(2)" id="lvl2-btn">Nivel 2 — Escribir</button>

<div id="main-container"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const SCENARIOS = [
  {

      { id:'d1', label:'DOTACIÓN BMV', slots:['TMO C1','DMO BV0'] },

  },
  {
    id:'e12', title:'Escenario 1.2', sub:'Incidentes multidisciplinares — Zonas limítrofes CPBV',
    layout:'dual-cecom',
    cecoms:[
      { id:'cb', label:'CECOM BMV',  slots:['TMO 1-GLOBAL'] },
      { id:'cc', label:'CECOM CPBV', slots:['TMO 1-GLOBAL'] },

    dotRowLabels:['Vehículos + Mando','Mando + Resto dotación'],
    dots:[
      { id:'db', label:'DOTACIÓN BMV',  slots:['TMO 1-GLOBAL','DMO BV0'] },
      { id:'dc', label:'DOTACIÓN CPBV', slots:['TMO 1-GLOBAL'] },
    ]
  },
  {
    id:'e2', title:'Escenario 2', sub:'Emergencia localizada pequeña extensión — Constitución PMA',
    layout:'cecom-pma-dots',
    cecom:{ label:'CECOM', slots:['TMO C2'] },
    pma:  { label:'PMA',   slots:['TMO C2','TMO C1','DMO BV0'] },
    dotRowLabels:['Vehículos','Mandos + Resto dotación'],
    dots:[
      { id:'d1', label:'DOTACIÓN 1', slots:['TMO C1','DMO BV0'] },
      { id:'d2', label:'DOTACIÓN 2', slots:['TMO C1','DMO BV0'] },
      { id:'d3', label:'DOTACIÓN 3', slots:['TMO C1','DMO BV0'] },
    ]
  },
  {
    id:'e31', title:'Escenario 3.1', sub:'Emergencia sectorizada sin medios ajenos',
    layout:'cecom-pma-sectors',
    cecom:{ label:'CECOM', slots:['TMO C2'] },
    pma:  { label:'PMA',   slots:['TMO C2','TMO A1'] },
    sectorRowLabels:['Jefe sector',null],
    sectors:[
      { id:'s1', label:'JEFE SECTOR 1', slots:['TMO A1','DMO BV0'] },
      { id:'s2', label:'JEFE SECTOR 2', slots:['TMO A1','DMO BV1'] },
      { id:'s3', label:'JEFE SECTOR 3', slots:['TMO A1','DMO BV2'] },
      { id:'s4', label:'JEFE SECTOR 4', slots:['TMO A1','DMO BV3'] },
    ],
    dotRowLabels:['Vehículos','Mando + Resto dotación'],
    dots:[
      { id:'d1', label:'DOT. SECTOR 1', slots:['TMO C2','DMO BV0'] },
      { id:'d2', label:'DOT. SECTOR 2', slots:['TMO C2','DMO BV1'] },
      { id:'d3', label:'DOT. SECTOR 3', slots:['TMO C2','DMO BV2'] },
      { id:'d4', label:'DOT. SECTOR 4', slots:['TMO C2','DMO BV3'] },
    ]
  },
  {
    id:'e32', title:'Escenario 3.2', sub:'Emergencia sectorizada con medios ajenos',
    layout:'cecom-pma-sectors-ext',
    cecom:{ label:'CECOM',  slots:['TMO C2'] },
    crm:  { label:'CRM',    slots:['TMO SECTOR-7V'] },
    otras:{ label:'OTRAS UNIDADES BÁSICAS PMA', slots:['TMO PMA-2-V'] },
    peif: { label:'MEDIOS PEIF', slots:['TMO UBE Z-6','BANDA AÉREA/GRUPOS AIRE'] },
    pma:  { label:'PMA', slots:['TMO C2','TMO SECTOR-7V','TMO PMA-2-V','TMO UBE Z-6','BANDA AÉREA/GRUPOS AIRE'] },
    sectorRowLabels:['Jefe sector',null],
    sectors:[
      { id:'s1', label:'JEFE SECTOR 1', slots:['TMO SECTOR-7V','DMO BV0'] },
      { id:'s2', label:'JEFE SECTOR 2', slots:['TMO SECTOR-7V','DMO BV1'] },
      { id:'s3', label:'JEFE SECTOR 3', slots:['TMO SECTOR-7V','DMO BV2'] },
      { id:'s4', label:'JEFE SECTOR 4', slots:['TMO SECTOR-7V','DMO BV3'] },
    ],
    dotRowLabels:['Vehículos','Mando + Resto dotación'],
    dots:[
      { id:'d1', label:'DOT. SECTOR 1', slots:['TMO C2','DMO BV0'] },
      { id:'d2', label:'DOT. SECTOR 2', slots:['TMO C2','DMO BV1'] },
      { id:'d3', label:'DOT. SECTOR 3', slots:['TMO C2','DMO BV2'] },
      { id:'d4', label:'DOT. SECTOR 4', slots:['TMO C2','DMO BV3'] },
    ]
  },
  {
    id:'e33', title:'Escenario 3.3', sub:'Emergencia sectorizada en túneles de metro',
    layout:'cecom-pma-sectors-metro',
    cecom:{ label:'CECOM', slots:['TMO C2'] },
    crm:  { label:'CRM',   slots:['TMO C3'] },
    otras:{ label:'OTRAS UNIDADES BÁSICAS PMA', slots:['TMO PMA-1-V'] },
    pma:  { label:'PMA', slots:['TMO C2','TMO PMA-1-V','TMO C3','TMO A1'] },
    sectorRowLabels:['Jefe sector / Mando',null],
    sectors:[
      { id:'s1', label:'JEFE SECTOR EST. 1', slots:['TMO A1','TMO A2'] },
      { id:'s2', label:'JEFE SECTOR EST. 2', slots:['TMO A1','TMO B1'] },
      { id:'s3', label:'JEFE SECTOR EST. 3', slots:['TMO A1','TMO B2'] },
      { id:'s4', label:'JEFE SECTOR EST. 4', slots:['TMO A1','TMO B3'] },
    ],
    dotRowLabels:['Mando + Resto dotación','Vehículos'],
    dots:[
      { id:'d1', label:'DOT. SECTOR 1', slots:['TMO A2','TMO C2'] },
      { id:'d2', label:'DOT. SECTOR 2', slots:['TMO B1','TMO C2'] },
      { id:'d3', label:'DOT. SECTOR 3', slots:['TMO B2','TMO C2'] },
      { id:'d4', label:'DOT. SECTOR 4', slots:['TMO B3','TMO C2'] },
    ]
  },
  // REFERENCE TABLES
  {
    id:'tbl-grupos', title:'Tabla Grupos', sub:'Objetivo de comunicación → Nombre del grupo',
    layout:'table-grupos'
  },
  {
    id:'tbl-pasarela', title:'Tabla DMO/TMO', sub:'Grupo DMO → TMO asociado (modo pasarela)',
    layout:'table-pasarela'
  }
];

const GRUPOS_TABLE = [
  { objetivo:'Comunicación entre dotación y CECOM',                   grupo:'C1 - BMV OP / Reserva 2' },
  { objetivo:'Comunicación entre PMA y CECOM',                        grupo:'C2 - BMV OP' },
  { objetivo:'Comunicación entre PMA y CRM',                          grupo:'C3 - BMV OP' },
  { objetivo:'Comunicación entre PMA y Jefes de Sector',              grupo:'A1 - BMV OP' },
  { objetivo:'Comunicación en zonas limítrofes con el CPBV',          grupo:'1 - Global' },
  { objetivo:'Comunicación en un Incendio Forestal con medios PEIF',  grupo:'UBE Z-6 V³' },
  { objetivo:'Comunicación entre PMP y CECOM',                        grupo:'Reserva 1' },
  { objetivo:'Comunicación entre PMP y sector 1',                     grupo:'Operativos 1' },
  { objetivo:'Comunicación entre PMP y sector 2',                     grupo:'Operativos 2' },
  { objetivo:'Comunicación entre PMP y sector 3',                     grupo:'Reserva 2' },
  { objetivo:'Grupo a disposición de dirección',                      grupo:'Dirección' },
  { objetivo:'Comunicación Protección Civil',                         grupo:'VPC' },
];

const PASARELA_TABLE = [
  { dmo:'BV0', tmo:'A2 - BMV OP' },
  { dmo:'BV1', tmo:'B1 - BMV OP' },
  { dmo:'BV2', tmo:'B2 - BMV OP' },
  { dmo:'BV3', tmo:'B3 - BMV OP' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let current = 'e01';
let level = 1;
let dragging = null;
let totalOk = 0, totalErr = 0;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function node(n) {
  const slots = n.slots.map((s,i) => dzHtml(`${n.id}_${i}`, s)).join('');
  return `<div class="node"><div class="node-title">${n.label}</div>${slots}</div>`;
}
function dzHtml(id, correct) {
  if (level === 1) {
    return `<div class="drop-zone" id="dz_${id}" data-correct="${correct}" ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,this)"><span class="ph" style="pointer-events:none">· · ·</span></div>`;
  } else {
    return `<div class="drop-zone" id="dz_${id}" data-correct="${correct}"><input type="text" placeholder="escribe…" oninput="" onkeydown="if(event.key==='Enter')checkInput(this.closest('.drop-zone'))"></div>`;
  }
}
function arrow(dir) { return `<div class="d-arrow">${dir}</div>`; }
function harrow(dir) { return `<div class="h-arrow">${dir}</div>`; }

// collect all unique chips for a scenario
function buildChips(sc) {
  const all = [];
  function addNode(n) { if(n && n.slots) n.slots.forEach(s => all.push(s)); }
  addNode(sc.cecom); addNode(sc.pmp); addNode(sc.pma); addNode(sc.crm); addNode(sc.otras); addNode(sc.peif);
  if(sc.cecoms) sc.cecoms.forEach(addNode);
  if(sc.sectors) sc.sectors.forEach(addNode);
  if(sc.dots) sc.dots.forEach(addNode);
  if(sc.zones) sc.zones.forEach(addNode);
  const seen = {};
  const chips = [];
  all.forEach(s => {
    seen[s] = (seen[s]||0) + 1;
    chips.push({ label:s, key:`${s}_${seen[s]}` });
  });
  return [...new Map(chips.map(c=>[c.key,c])).values()].sort(()=>Math.random()-.5);
}

// ── RENDER NAV ────────────────────────────────────────────────────────────────
function renderNav() {
  document.getElementById('tabs').innerHTML = SCENARIOS.map(s =>
    `<button class="tab-btn ${s.id===current?'active':''}" onclick="selectTab('${s.id}')">${s.title}</button>`
  ).join('');
}

function selectTab(id) { current=id; renderNav(); renderMain(); }
function setLevel(n) {
  level=n;
  document.getElementById('lvl1-btn').classList.toggle('active',n===1);
  document.getElementById('lvl2-btn').classList.toggle('active',n===2);
  renderMain();
}

// ── RENDER MAIN ───────────────────────────────────────────────────────────────
function renderMain() {
  const sc = SCENARIOS.find(s=>s.id===current);
  if (sc.layout === 'table-grupos')    { renderTableGrupos(sc); return; }
  if (sc.layout === 'table-pasarela')  { renderTablePasarela(sc); return; }
  renderScenario(sc);
}

// ── SCENARIO LAYOUTS ─────────────────────────────────────────────────────────
function renderScenario(sc) {
  let diagramHtml = '';

  if (sc.layout === 'cecom-pmp-dots' || sc.layout === 'cecom-dot') {
    const topLabel = sc.pmp ? sc.pmp.label : null;
    diagramHtml += `<div class="d-row">`;
    diagramHtml += node({...sc.cecom, id:'cecom'});
    if (sc.pmp) { diagramHtml += harrow('↔'); diagramHtml += node({...sc.pmp, id:'pmp'}); }
    diagramHtml += `</div>`;
    diagramHtml += arrow('↓');
    diagramHtml += `<div class="d-row" style="align-items:flex-start;">`;
    if (sc.dotRowLabels) diagramHtml += `<div class="row-labels">${sc.dotRowLabels.map(l=>`<span>${l||''}</span>`).join('')}</div>`;
    sc.dots.forEach(d => { diagramHtml += node(d); });
    diagramHtml += `</div>`;
  }

  else if (sc.layout === 'cecom-pmp-zones') {
    diagramHtml += `<div class="d-row">`;
    diagramHtml += node({...sc.cecom, id:'cecom'});
    diagramHtml += harrow('↔');
    diagramHtml += node({...sc.pmp, id:'pmp'});
    diagramHtml += `</div>`;
    diagramHtml += arrow('↓');
    diagramHtml += `<div class="d-row" style="align-items:flex-start;">`;
    if (sc.zoneRowLabels) diagramHtml += `<div class="row-labels">${sc.zoneRowLabels.map(l=>`<span>${l||''}</span>`).join('')}</div>`;
    sc.zones.forEach(z => { diagramHtml += node(z); });
    diagramHtml += `</div>`;
  }

  else if (sc.layout === 'dual-cecom') {
    diagramHtml += `<div class="d-row">`;
    diagramHtml += node(sc.cecoms[0]);
    diagramHtml += harrow('↔');
    diagramHtml += node(sc.cecoms[1]);
    diagramHtml += `</div>`;
    diagramHtml += arrow('↓');
    diagramHtml += `<div class="d-row" style="align-items:flex-start;">`;
    if (sc.dotRowLabels) diagramHtml += `<div class="row-labels">${sc.dotRowLabels.map(l=>`<span>${l||''}</span>`).join('')}</div>`;
    sc.dots.forEach(d => { diagramHtml += node(d); });
    diagramHtml += `</div>`;
  }

  else if (sc.layout === 'cecom-pma-dots') {
    diagramHtml += `<div class="d-row">`;
    diagramHtml += node({...sc.cecom, id:'cecom'});
    diagramHtml += harrow('↔');
    diagramHtml += node({...sc.pma, id:'pma'});
    diagramHtml += `</div>`;
    diagramHtml += arrow('↓');
    diagramHtml += `<div class="d-row" style="align-items:flex-start;">`;
    if (sc.dotRowLabels) diagramHtml += `<div class="row-labels">${sc.dotRowLabels.map(l=>`<span>${l||''}</span>`).join('')}</div>`;
    sc.dots.forEach(d => { diagramHtml += node(d); });
    diagramHtml += `</div>`;
  }

  else if (sc.layout === 'cecom-pma-sectors' || sc.layout === 'cecom-pma-sectors-ext' || sc.layout === 'cecom-pma-sectors-metro') {
    // top row
    diagramHtml += `<div class="d-row" style="align-items:flex-start;">`;
    // left col: cecom + crm
    diagramHtml += `<div style="display:flex;flex-direction:column;gap:8px;">`;
    diagramHtml += node({...sc.cecom, id:'cecom'});
    if (sc.crm) diagramHtml += node({...sc.crm, id:'crm'});
    diagramHtml += `</div>`;
    // center: pma
    diagramHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:4px;">`;
    diagramHtml += `<div style="display:flex;align-items:center;gap:6px;">${harrow('↔')}${node({...sc.pma, id:'pma'})}${harrow('↔')}</div>`;
    diagramHtml += `</div>`;
    // right col: otras + peif
    if (sc.otras || sc.peif) {
      diagramHtml += `<div style="display:flex;flex-direction:column;gap:8px;">`;
      if (sc.otras) diagramHtml += node({...sc.otras, id:'otras'});
      if (sc.peif)  diagramHtml += node({...sc.peif,  id:'peif'});
      diagramHtml += `</div>`;
    }
    diagramHtml += `</div>`;
    // sectors row
    diagramHtml += arrow('↓');
    diagramHtml += `<div class="d-row" style="align-items:flex-start;">`;
    if (sc.sectorRowLabels) diagramHtml += `<div class="row-labels">${sc.sectorRowLabels.map(l=>`<span>${l||''}</span>`).join('')}</div>`;
    sc.sectors.forEach((s,i) => {
      if (i>0) diagramHtml += harrow('↔');
      diagramHtml += node(s);
    });
    diagramHtml += `</div>`;
    // dots row
    diagramHtml += arrow('↓');
    diagramHtml += `<div class="d-row" style="align-items:flex-start;">`;
    if (sc.dotRowLabels) diagramHtml += `<div class="row-labels">${sc.dotRowLabels.map(l=>`<span>${l||''}</span>`).join('')}</div>`;
    sc.dots.forEach(d => { diagramHtml += node(d); });
    diagramHtml += `</div>`;
  }

  // pool / check button
  let bottomHtml = '';
  if (level === 1) {
    const chips = buildChips(sc);
    bottomHtml = `<div class="pool-wrap">
      <div class="pool-label">Grupos disponibles — arrastra al hueco</div>
      <div class="pool" id="pool" ondragover="event.preventDefault()" ondrop="returnPool(event)">
        ${chips.map(c=>`<div class="chip" draggable="true" data-label="${c.label}" ondragstart="onDragStart(event)">${c.label}</div>`).join('')}
      </div>
    </div>`;
  } else {
    bottomHtml = `<div class="pool-wrap" style="border-top:none;padding-top:0;margin-top:1rem;">
      <button class="act primary" onclick="checkAllTyped()">Comprobar todo</button>
    </div>`;
  }

  document.getElementById('main-container').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">${sc.title}</div><div class="card-sub">${sc.sub}</div></div>
        <div class="btn-row"><button class="act" onclick="resetCurrent()">Reiniciar</button></div>
      </div>
      <div class="diagram">${diagramHtml}</div>
      ${bottomHtml}
      <div class="result" id="result"></div>
    </div>`;
}

// ── TABLE: GRUPOS ─────────────────────────────────────────────────────────────
function renderTableGrupos(sc) {
  const chips = GRUPOS_TABLE.map(r=>r.grupo).sort(()=>Math.random()-.5);
  let rows = GRUPOS_TABLE.map((r,i) => {
    const dz = level===1
      ? `<div class="drop-zone" id="dztg_${i}" data-correct="${r.grupo}" ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,this)"><span class="ph" style="pointer-events:none">· · ·</span></div>`
      : `<div class="drop-zone" id="dztg_${i}" data-correct="${r.grupo}"><input type="text" placeholder="escribe…" onkeydown="if(event.key==='Enter')checkInput(this.closest('.drop-zone'))"></div>`;
    return `<tr><td>${r.objetivo}</td><td class="dz-cell">${dz}</td></tr>`;
  }).join('');

  let bottomHtml = level===1
    ? `<div class="pool-wrap">
        <div class="pool-label">Grupos disponibles — arrastra al hueco</div>
        <div class="pool" id="pool" ondragover="event.preventDefault()" ondrop="returnPool(event)">
          ${chips.map(g=>`<div class="chip" draggable="true" data-label="${g}" ondragstart="onDragStart(event)">${g}</div>`).join('')}
        </div>
       </div>`
    : `<div class="pool-wrap" style="border-top:none;padding-top:0;margin-top:1rem;"><button class="act primary" onclick="checkAllTyped()">Comprobar todo</button></div>`;

  document.getElementById('main-container').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">${sc.title}</div><div class="card-sub">${sc.sub}</div></div>
        <div class="btn-row"><button class="act" onclick="resetCurrent()">Reiniciar</button></div>
      </div>
      <table class="ref-table">
        <thead><tr><th>Objetivo de la comunicación</th><th>Nombre del grupo</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${bottomHtml}
      <div class="result" id="result"></div>
    </div>`;
}

// ── TABLE: PASARELA ───────────────────────────────────────────────────────────
function renderTablePasarela(sc) {
  const chips = PASARELA_TABLE.map(r=>r.tmo).sort(()=>Math.random()-.5);
  let rows = PASARELA_TABLE.map((r,i) => {
    const dz = level===1
      ? `<div class="drop-zone" id="dztp_${i}" data-correct="${r.tmo}" ondragover="onOver(event)" ondragleave="onLeave(event)" ondrop="onDrop(event,this)"><span class="ph" style="pointer-events:none">· · ·</span></div>`
      : `<div class="drop-zone" id="dztp_${i}" data-correct="${r.tmo}"><input type="text" placeholder="escribe…" onkeydown="if(event.key==='Enter')checkInput(this.closest('.drop-zone'))"></div>`;
    return `<tr><td style="font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--chip-text);">${r.dmo}</td><td class="dz-cell">${dz}</td></tr>`;
  }).join('');

  let bottomHtml = level===1
    ? `<div class="pool-wrap">
        <div class="pool-label">TMO disponibles — arrastra al hueco</div>
        <div class="pool" id="pool" ondragover="event.preventDefault()" ondrop="returnPool(event)">
          ${chips.map(t=>`<div class="chip" draggable="true" data-label="${t}" ondragstart="onDragStart(event)">${t}</div>`).join('')}
        </div>
       </div>`
    : `<div class="pool-wrap" style="border-top:none;padding-top:0;margin-top:1rem;"><button class="act primary" onclick="checkAllTyped()">Comprobar todo</button></div>`;

  document.getElementById('main-container').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">${sc.title}</div><div class="card-sub">${sc.sub}</div></div>
        <div class="btn-row"><button class="act" onclick="resetCurrent()">Reiniciar</button></div>
      </div>
      <table class="ref-table">
        <thead><tr><th>Grupo DMO</th><th>Grupo TMO asociado (modo pasarela)</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${bottomHtml}
      <div class="result" id="result"></div>
    </div>`;
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
function onDragStart(e) {
  dragging = e.currentTarget;
  dragging.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
document.addEventListener('dragend', () => {
  if (dragging) { dragging.classList.remove('dragging'); dragging = null; }
});
function onOver(e)  { e.preventDefault(); e.currentTarget.classList.add('over'); }
function onLeave(e) { e.currentTarget.classList.remove('over'); }

function onDrop(e, dz) {
  e.preventDefault();
  dz.classList.remove('over','correct','wrong');
  if (!dragging) return;
  const existing = dz.querySelector('.chip');
  if (existing) {
    if (dz.classList.contains('correct')) totalOk = Math.max(0,totalOk-1);
    if (dz.classList.contains('wrong'))   totalErr = Math.max(0,totalErr-1);
    existing.draggable = true;
    dz.classList.remove('correct','wrong');
    const fi = dz.querySelector('.fi'); if(fi) fi.remove();
    document.getElementById('pool').appendChild(existing);
  }
  const ph = dz.querySelector('.ph'); if(ph) ph.remove();
  dz.appendChild(dragging);
  const ok = dragging.dataset.label === dz.dataset.correct;
  dz.classList.add(ok ? 'correct' : 'wrong');
  const ic = document.createElement('span'); ic.className='fi'; ic.textContent = ok?'✓':'✗';
  dz.appendChild(ic);
  // if wrong, keep chip draggable so user can move it back
  if (ok) {
    dragging.draggable = false;
  } else {
    dragging.draggable = true;
  }
  ok ? totalOk++ : totalErr++;
  updateScore();
  dragging = null;
}

function returnPool(e) {
  e.preventDefault();
  if (!dragging) return;
  const from = dragging.closest('.drop-zone');
  if (from) {
    if (from.classList.contains('correct')) totalOk = Math.max(0,totalOk-1);
    if (from.classList.contains('wrong'))   totalErr = Math.max(0,totalErr-1);
    from.classList.remove('correct','wrong');
    const fi = from.querySelector('.fi'); if(fi) fi.remove();
    if (!from.querySelector('.ph')) {
      const p = document.createElement('span'); p.className='ph'; p.style.pointerEvents='none'; p.textContent='· · ·';
      from.appendChild(p);
    }
  }
  dragging.draggable = true;
  document.getElementById('pool').appendChild(dragging);
  dragging = null;
}

// ── TYPING ────────────────────────────────────────────────────────────────────
function norm(s) { return s.trim().toUpperCase().replace(/\s+/g,' '); }

function checkInput(dz) {
  const inp = dz.querySelector('input');
  if (!inp || !inp.value.trim()) return;
  if (dz.classList.contains('correct') || dz.classList.contains('wrong')) return; // already checked
  const ok = norm(inp.value) === norm(dz.dataset.correct);
  dz.classList.add(ok?'correct':'wrong');
  const ic = document.createElement('span'); ic.className='fi'; ic.textContent=ok?'✓':'✗';
  dz.appendChild(ic);
  inp.disabled = true;
  ok ? totalOk++ : totalErr++;
  updateScore();
}

function checkAllTyped() {
  document.querySelectorAll('.drop-zone').forEach(dz => {
    const inp = dz.querySelector('input');
    if (inp && inp.value.trim()) checkInput(dz);
  });
  const dzs = document.querySelectorAll('.drop-zone');
  let total=dzs.length, correct=0;
  dzs.forEach(dz => { if(dz.classList.contains('correct')) correct++; });
  const r = document.getElementById('result');
  r.textContent = correct===total ? `✓ perfecto — ${correct}/${total}` : `${correct}/${total} correctos`;
  r.className = 'result ' + (correct===total?'ok':'fail');
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetCurrent() {
  document.querySelectorAll('.drop-zone').forEach(dz => {
    if (dz.classList.contains('correct')) totalOk = Math.max(0,totalOk-1);
    if (dz.classList.contains('wrong'))   totalErr = Math.max(0,totalErr-1);
  });
  updateScore();
  renderMain();
}

function updateScore() {
  document.getElementById('sc-ok').textContent  = totalOk;
  document.getElementById('sc-err').textContent = totalErr;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderNav();
renderMain();
</script>
